<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elemente-Bibliothek | Turn10 Digital</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="elemente.css">
</head>
<body>

    <header class="header">
        <div class="logo">
            <img src="bilder/app-icon.png" alt="Turn10 Digital Logo">
            <span>Turn10 Digital</span>
        </div>
        
        <div class="search-bar">
            <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
            <input type="search" placeholder="Suche..." class="search-input">
        </div>
        
        <div class="user-profile">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <span>User Profile</span>
        </div>
    </header>

    <nav class="navbar">
        <ul>
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><a href="element.html" class="active">Elemente-Bibliothek</a></li>
            <li><a href="#">Übungsbuilder</a></li>
            <li><a href="#">Analyse-Hub</a></li>
            <li><a href="#">Mein Bereich</a></li>
        </ul>
    </nav>

    <main class="library-wrapper">
        <h2 id="library-title" class="library-title">Bitte Gerät wählen</h2>
        <p id="library-description" class="library-description">Wähle ein Gerät, um die Turn10-Elemente zu sehen.</p>
        
        <div id="device-menu" class="device-menu"></div>

        <div id="element-container" class="grid-container"></div>
    </main>

    <!-- Modal für Elementdetails -->
    <div id="detail-modal" class="modal-overlay">
        <div class="modal-content">
            <button class="close-btn" onclick="closeModal()">×</button>
            <div class="detail-layout">
                
                <section class="detail-hero">
                    <div class="detail-badge-row">
                        <span id="device-chip" class="detail-chip detail-chip-device"></span>
                        <span id="difficulty-chip" class="detail-chip"></span>
                        <span id="points-chip" class="detail-chip"></span>
                    </div>
                    <h2 id="modal-title" class="detail-title"></h2>
                    <p id="modal-desc" class="detail-description"></p>
                </section>

                <aside class="detail-sidebar">
                    <!-- Video Sektion -->
                    <div class="detail-card">
                        <h3>Video-Anleitung</h3>
                        <div id="video-container" class="video-wrapper"></div>
                        <a id="video-link" class="video-link" target="_blank" rel="noopener noreferrer">▶ Auf YouTube ansehen</a>
                    </div>

                    <!-- Optimalausführung (wird durch JS gefüllt) -->
                    <div class="detail-card">
                        <h3>Optimalausführung</h3>
                        <div id="element-focus" class="detail-list"></div>
                    </div>

                    <!-- Nicht-Anerkennung (wird durch JS gefüllt) -->
                    <div class="detail-card">
                        <h3>Nicht-Anerkennung</h3>
                        <div id="element-analysis" class="detail-list"></div>
                    </div>
                </aside>
            </div>
        </div>
    </div>

 <script src="elemente.js"></script>
</body>
</html>
